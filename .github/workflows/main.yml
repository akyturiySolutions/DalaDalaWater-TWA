name: Build TWA APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Fix wrapper and properties
        run: |
          echo "distributionBase=GRADLE_USER_HOME" > DalaDalaWater-TWA/gradle/wrapper/gradle-wrapper.properties
          echo "distributionPath=wrapper/dists" >> DalaDalaWater-TWA/gradle/wrapper/gradle-wrapper.properties
          echo "distributionUrl=https\://services.gradle.org/distributions/gradle-8.0-bin.zip" >> DalaDalaWater-TWA/gradle/wrapper/gradle-wrapper.properties
          echo "zipStoreBase=GRADLE_USER_HOME" >> DalaDalaWater-TWA/gradle/wrapper/gradle-wrapper.properties
          echo "zipStorePath=wrapper/dists" >> DalaDalaWater-TWA/gradle/wrapper/gradle-wrapper.properties
          echo "org.gradle.jvmargs=-Xmx2048m" > DalaDalaWater-TWA/gradle.properties
          echo "android.useAndroidX=true" >> DalaDalaWater-TWA/gradle.properties
          echo "android.enableJetifier=true" >> DalaDalaWater-TWA/gradle.properties
          echo "org.gradle.daemon=false" >> DalaDalaWater-TWA/gradle.properties
      - name: Make gradlew executable
        run: chmod +x DalaDalaWater-TWA/gradlew
      - name: Build Debug APK
        run: cd DalaDalaWater-TWA && ./gradlew assembleDebug --stacktrace
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: DalaDalaWater-DEBUG
          path: DalaDalaWater-TWA/app/build/outputs/apk/debug/*.apk
