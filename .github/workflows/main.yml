name: Build TWA APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Make gradlew executable
        run: chmod +x DalaDalaWater-TWA/gradlew
      - name: Build Debug APK
        run: cd DalaDalaWater-TWA && ./gradlew assembleDebug --stacktrace
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: DalaDalaWater-DEBUG
          path: DalaDalaWater-TWA/app/build/outputs/apk/debug/*.apk
